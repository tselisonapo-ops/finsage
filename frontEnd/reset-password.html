<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Reset Password - FinSage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui; background: #f5f7fb; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .card { background:#fff; padding:32px 40px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.08); max-width:420px; width:100%; text-align:center; }
    input { width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:6px; font-size:1rem; }
    .btn { margin-top:16px; padding:10px 18px; border-radius:999px; border:none; background:#00c8c8; color:#fff; width:100%; font-weight:500; cursor:pointer; }
    .btn:hover { background:#00b4b4; }
    .status { margin-top:12px; font-size:0.9rem; color:#555; }
    .signin-link {
      color:#00c8c8;
      font-weight:600;
      text-decoration:none;
      display:inline-block;
      margin-top:6px;
    }
    .signin-link:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>

    <input type="password" id="newPassword" placeholder="New Password" />
    <input type="password" id="confirmPassword" placeholder="Confirm Password" />

    <button class="btn" onclick="resetPassword()">Reset Password</button>

    <p class="status" id="status"></p>
  </div>

  <script src="config.js"></script>
<script>
  async function resetPassword() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");

    const newPassword = document.getElementById("newPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();
    const statusEl = document.getElementById("status");

    if (!token || !newPassword || newPassword !== confirmPassword) {
      statusEl.textContent = "Passwords must match and token must be present.";
      return;
    }

    try {
      const API_BASE = window.APP_CONFIG?.API_BASE || "";

      const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
        method: "POST", // ✅ CRITICAL FIX
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, newPassword })
      });

      let data = {};
      try {
        data = await res.json();
      } catch {
        data = {};
      }

      if (res.ok) {
        statusEl.innerHTML = `
          Password reset successful.<br>
          <a class="signin-link" href="signin.html">Click here to sign in</a>
        `;
      } else {
        statusEl.textContent = data.error || "Reset failed.";
      }
    } catch (err) {
      console.error("Reset error:", err);
      statusEl.textContent = "Network error.";
    }
  }
</script>
</body>
</html>
