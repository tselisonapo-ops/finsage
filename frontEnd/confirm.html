<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Confirming your email…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 32px 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.5rem;
    }
    p {
      margin: 4px 0;
      color: #555;
    }
    .status {
      margin-top: 16px;
      font-weight: 500;
    }
    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      background: #00c8c8;
      color: #fff;
    }
  </style>
<!-- confirm.html (updated) -->
</head>
<body>
  <div class="card">
    <h1>Email confirmation</h1>
    <p id="hint">Please wait while we activate your FinSage account.</p>

    <p class="status" id="status">Contacting server…</p>

    <!-- Success -->
    <button id="signinBtn" class="btn" style="display:none"
            onclick="window.location.href='signin.html?action=confirm_success'">
      Continue to Sign In
    </button>

    <!-- Expired -->
    <div id="expiredBox" style="display:none; margin-top:12px;">
      <p class="text-sm" style="margin:0 0 10px 0;">
        Your confirmation link has expired (links expire after <b>48 hours</b>).
        Enter your email to get a new link.
      </p>

      <input id="email" type="email" placeholder="you@example.com"
             style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px;" />

      <button id="resendBtn" class="btn" type="button">Resend confirmation email</button>
      <p class="text-xs" id="resendMsg" style="margin-top:10px;"></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG.API_BASE;// or your config
    const statusEl = document.getElementById("status");
    const hintEl   = document.getElementById("hint");
    const signinBtn = document.getElementById("signinBtn");

    const expiredBox = document.getElementById("expiredBox");
    const resendBtn  = document.getElementById("resendBtn");
    const resendMsg  = document.getElementById("resendMsg");
    const emailInput = document.getElementById("email");

    function showExpiredUI() {
      hintEl.textContent = "Your confirmation link is no longer valid.";
      expiredBox.style.display = "block";
    }

    async function resendConfirmation() {
      const email = (emailInput.value || "").trim().toLowerCase();
      if (!email) {
        resendMsg.textContent = "Please enter your email address.";
        return;
      }

      resendBtn.disabled = true;
      resendMsg.textContent = "Sending…";

      try {
        const res = await fetch(`${API_BASE}/api/auth/resend-confirm`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json().catch(() => ({}));
        // Always generic message (anti-enumeration)
        resendMsg.textContent = (data && data.message) || "If that email exists, a confirmation email has been sent.";
      } catch (e) {
        resendMsg.textContent = "Network error. Please try again.";
      } finally {
        resendBtn.disabled = false;
      }
    }

    resendBtn.addEventListener("click", resendConfirmation);

    (async function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        statusEl.textContent = "Missing confirmation token in the link.";
        showExpiredUI();
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/auth/confirm`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const code = (data && data.code) || "";
          const msg = (data && data.error) || "Error confirming your account.";

          statusEl.textContent = msg;

          // If your backend returns 410 + code CONFIRM_EXPIRED
          if (res.status === 410 || code === "CONFIRM_EXPIRED") {
            showExpiredUI();
          } else if (res.status === 404) {
            // invalid token (or old behavior "Invalid or expired token")
            showExpiredUI();
          }
          return;
        }

        statusEl.textContent = "✅ Email confirmed! You can now sign in.";
        signinBtn.style.display = "inline-block";

      } catch (err) {
        console.error("Confirm network error:", err);
        statusEl.textContent = "Network error contacting server.";
      }
    })();
  </script>
</body>
