<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Check Your Email - FinSage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 32px 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.5rem;
    }
    p {
      margin: 8px 0;
      color: #555;
    }
    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      background: #00c8c8;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Registration Successful</h1>
    <p id="emailMsg">Please check your email to confirm your account.</p>
    <p>If you don’t see the email, check your spam folder.</p>
    <button class="btn" onclick="window.location.href='index.html'">
      Back to Home
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");
    if (email) {
      document.getElementById("emailMsg").textContent =
        `We sent a confirmation link to ${email}. Please check your inbox.`;
    }
  </script>
</body>
</html>
